# Washing Machine
properties:
- property: Current_program_phase
  sensor:
    device_class: enum
    options:
      0: not_available
      1: weigh
      2: prewash
      3: wash
      4: rinse
      7: spin-dry
      8: drying
      10: finished
- property: Selected_program_ID
  select:
    options:
      1: "cotton_dry"
      2: "synthetic_dry"
      4: "refresh"
      5: "anti_allergy"
      6: "drum_cleaning"
      7: "cotton"
      8: "synthetic"
      9: "eco_40_60"
      10: "wool"
      11: "fast15"
      12: "mix"
      14: "spin-dry"
      16: "baby"
      20: "rinse_spin"
      21: "delicates"
      22: "clean_dry_60"
      24: "shirts"
      41: "power49"
      42: "auto"
      44: "bed_linen"
      45: "jeans"
