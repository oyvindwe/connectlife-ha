# Portable air conditioner
properties:
- property: f_ecm
  # f_ecm: appears to indicate which unit f_electricity uses (f_ecm=1
  # has been observed alongside mA current values; absent in 009-104,
  # which reports in hW). Exposed as a diagnostic so users can report
  # the value alongside f_electricity readings.
  sensor:
    read_only: true
  entity_category: diagnostic
  hide: true
- property: f_electricity
  # f_electricity: unit varies by device. Most devices observed report
  # in mA. Devices that report in other units (e.g. hW), need a
  # per-feature override mapping to power/kW (see e.g. 009-104).
  # The companion property f_ecm appears to discriminate the scheme
  # (f_ecm=1 → mA; absent → hW).
  sensor:
    device_class: current
    unit: mA
    read_only: true
    state_class: measurement
  hide: true
- property: f_power_consumption
  sensor:
    device_class: energy
    unit: kWh
    read_only: true
    state_class: total_increasing
  icon: mdi:lightning-bolt
- property: f_power_display
  sensor:
    device_class: power
    unit: W
    read_only: true
    state_class: measurement
  icon: mdi:lightning-bolt
- property: f_temp_in
  icon: mdi:thermometer
  climate:
    target: current_temperature
- property: t_eco
  icon: mdi:leaf
  switch:
    device_class: switch
- property: t_fan_mute
  hide: true
  icon: mdi:volume-variant-off
  switch:
    device_class: switch
- property: t_fan_speed
  climate:
    target: fan_mode
    options:
      0: auto
      2: low
      3: medium
      4: high
- property: t_power
  climate:
    target: is_on
- property: t_sleep
  icon: mdi:power-sleep
  switch:
    device_class: switch
- property: t_super
  icon: mdi:run-fast
  switch:
    device_class: switch
- property: t_temp
  climate:
    target: target_temperature
    min_value:
      celsius: 16
      fahrenheit: 61
    max_value:
      celsius: 32
      fahrenheit: 90
- property: t_temp_type
  climate:
    target: temperature_unit
    options:
      0: celsius
      1: fahrenheit
- property: t_up_down
  climate:
    target: swing_mode
    options:
      0: "off"
      1: "on"
- property: t_work_mode
  climate:
    target: hvac_mode
    options:
      0: fan_only
      1: heat
      2: cool
      3: dry
      4: auto
