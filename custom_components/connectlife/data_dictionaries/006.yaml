        1: true
    hide: true
    entity_category: diagnostic
  - property: f_e_inhumidity
    binary_sensor:
      device_class: problem
      options:
        0: false
        1: true
    hide: true
    entity_category: diagnostic
  - property: f_e_inkeys
    binary_sensor:
      device_class: problem
      options:
        0: false
        1: true
    hide: true
    entity_category: diagnostic
  - property: f_e_intemp
    binary_sensor:
      device_class: problem
      options:
        0: false
        1: true
    hide: true
    entity_category: diagnostic
  - property: f_e_invzero
    binary_sensor:
      device_class: problem
      options:
        0: false
        1: true
    hide: true
    entity_category: diagnostic
  - property: f_e_inwifi
    binary_sensor:
      device_class: problem
      options:
        0: false
        1: true
    hide: true
    entity_category: diagnostic
  - property: f_e_outcoiltemp
    binary_sensor:
      device_class: problem
      options:
        0: false
