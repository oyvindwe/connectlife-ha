#WashingMachine 025-1wj100923v0f
properties:
  - property: Current_program_phase
    sensor:
      device_class: enum
      options:
        0: not_available
        1: weigh
        2: prewash
        3: wash
        4: rinse
        7: spin-dry
  - property: ExtraRinseNum
    select:
      options:
        0: "0"
        1: "1"
        2: "2"
        3: "3"
  - property: RinseNum
    sensor:
      device_class: enum
      options:
        1: "1"
        2: "2"
        3: "3"
  - property: Selected_program_ID
    select:
      options:
        1: "cotton_dry"
        2: "synthetic_dry"
        4: "refresh"
        5: "anti_allergy"
        6: "drum_cleaning"
        7: "cotton"
        8: "synthetic"
        9: "eco_40_60"
        10: "wool"
        11: "fast15"
        14: "spin-dry"
        16: "baby"
        20: "rinse_spin"
        22: "clean_dry_60"
        41: "power49"
        42: "auto"
  - property: Spin_speed_rpm
    select:
      options:
        14: "1400"
        12: "1200"
        10: "1000"
        80: "800"
        60: "600"
        0: "none"
