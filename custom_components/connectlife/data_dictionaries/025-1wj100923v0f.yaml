#WashingMachine 025-1wj100923v0f
properties:
  - property: AutoTubClean
    switch:
  - property: Child_lock
    icon: mdi:lock
    switch:
  - property: Current_program_phase
    icon: mdi:state-machine
    sensor:
      device_class: enum
      options:
        0: not_available
        1: weigh
        2: prewash
        3: wash
        4: rinse
        7: spin-dry
      read_only: true
  - property: Detergent_display
    icon: mdi:alpha-d-circle-outline
    binary_sensor:
      options:
        0: false
        1: true
  - property: ExtraRinseNum
    icon: mdi:tray-plus
    entity_category: diagnostic
    select:
      options:
        0: "0"
        1: "1"
        2: "2"
        3: "3"
  - property: RinseNum
    icon: mdi:tray-plus
    sensor:
      device_class: enum
      options:
        1: "1"
        2: "2"
        3: "3"
  - property: Selected_program_ID
    icon: mdi:tshirt-crew
    select:
      options:
        1: "cotton_dry"
        2: "synthetic_dry"
        4: "refresh"
        5: "anti_allergy"
        6: "drum_cleaning"
        7: "cotton"
        8: "synthetic"
        9: "eco_40_60"
        10: "wool"
        11: "fast15"
        14: "spin-dry"
        16: "baby"
        20: "rinse_spin"
        22: "clean_dry_60"
        41: "power49"
        42: "auto"
  - property: Selected_program_remaining_time_in_minutes
    icon: mdi:camera-timer
    sensor:
      device_class: duration
      unit: min
      read_only: true
  - property: Selected_program_total_time_in_minutes
    icon: mdi:camera-timer
    sensor:
      device_class: duration
      unit: min
      read_only: true
  - property: Selected_program_total_running_time_in_minutes
    icon: mdi:camera-timer
    sensor:
      device_class: duration
      unit: min
      read_only: true
  - property: Softer_display
    icon: mdi:alpha-s-circle-outline
    binary_sensor:
      options:
        0: false
        1: true
  - property: Steam
    icon: mdi:heat-wave
    switch:
  - property: temperature
    icon: mdi:thermometer-lines
    select:
      options:
        0: "cold"
        2: "20"
        3: "30"
        4: "40"
        6: "60"
        9: "90"
  - property: Spin_speed_rpm
    icon: mdi:thermometer-lines
    select:
      options:
        14: "1400"
        12: "1200"
        10: "1000"
        80: "800"
        60: "600"
        0: "none"
  - property: spintime_index
    icon: mdi:camera-timer
    sensor:
      device_class: duration
      unit: min
      read_only: true
  - property: Water_consumption_int
    icon: mdi:water-pump
    sensor:
      state_class: total_increasing
      device_class: water
      unit: L
