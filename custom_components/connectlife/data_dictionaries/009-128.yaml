climate:
  presets:
    - t_eco: 1
      t_fan_speed: 0 # auto
      t_power: 1
      preset: eco
    - t_fan_mute: 1
      t_fan_speed: 0 # auto
      t_power: 1
      preset: mute
properties:
  # This featureset's spec exposes only t_up_down (no t_swing_angle), so
  # map it to the vertical swing_mode control instead of the default switch.
  - property: t_up_down
    climate:
      target: swing_mode
      options:
        0: "off"
        1: "on"
