# Washing machine WF3S1043BW3
properties:
- property: ApplicationPermissions
  hide: false
  sensor:
    read_only: true
- property: Current_program_phase
  sensor:
    device_class: enum
    options:
      0: not_available
      1: program_not_selected
      2: program_selected
      3: delay_start_waiting
      4: preheat
      5: preheat_finished
      6: prewash
      7: main_wash
      8: drying
      9: program_finished
      10: ventilating
      11: idle
      12: running
      13: anti_crease
      14: delay
      15: finished
- property: RinseNum
  sensor:
    unit: times
- property: Selected_program_ID
  sensor:
    read_only: true
    device_class: enum
    options:
      0: cotton_storage
      1: standard
      2: iron
      3: mix
      4: synthetic
      5: wool
      6: bed_linen
      7: time
      8: baby
      9: sensitive
      10: shirts
      11: sports
      12: fast89
      13: extra_hygiene
      14: remote
      15: none
- property: Spin_speed_rpm
  sensor:
    read_only: true
    unit: rpm
- property: temperature
  sensor:
    read_only: true
    device_class: temperature
    unit: °C
- property: Program_end_to_shutdown_time_in_minutes
  hide: true
