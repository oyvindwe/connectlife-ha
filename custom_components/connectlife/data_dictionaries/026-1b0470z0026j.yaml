# HISENSE American Side by Side Refrigerator RQ5P470SEIE
properties:
  - property: freeze_temperature
    number:
      device_class: temperature
      unit: °C
      min_value: -18
      max_value: -14
  - property: refrigerator_temperature
    number:
      device_class: temperature
      unit: °C
      min_value: 2
      max_value: 8
  - property: save_mode
    binary_sensor:
      options:
        0: false
        1: true
  - property: sf_mode
    binary_sensor:
      options:
        0: false
        1: true
  - property: sr_mode
    binary_sensor:
      options:
        0: false
        1: true
  - property: variation_temperature
    number:
      device_class: temperature
      unit: °C
      min_value: -18
      max_value: -14
  - property: vibration_alarm
    hide: true
    binary_sensor:
      device_class: vibration
