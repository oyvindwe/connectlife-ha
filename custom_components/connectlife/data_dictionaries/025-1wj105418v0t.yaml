# Washing Machine
properties:
- property: Current_program_phase
  sensor:
    device_class: enum
    options:
      0: not_available
      1: weigh
      2: prewash
      3: wash
      4: rinsing
      7: spinning
      8: drying
      10: finished
- property: ExtraRinseNum
  select:
    options:
      0: "0"
      1: "1"
      2: "2"
      3: "3"
- property: Selected_program_ID
  select:
    options:
      1: "cotton_dry"
      2: "synthetic_dry"
      4: "refresh"
      5: "allergy_care"
      6: "drum_clean"
      7: "cotton"
      8: "synthetic"
      9: "eco_40_60"
      10: "wool"
      11: "quick_15"
      14: "spin"
      16: "baby_care"
      20: "rinse_spin"
      22: "clean_dry_60"
      41: "power_49"
      42: "auto"
