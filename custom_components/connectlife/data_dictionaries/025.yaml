      read_only: true
  - property: Energy_estimate
    icon: mdi:lightning-bolt
    sensor:
      device_class: energy
      unit: kWh
      read_only: true
      state_class: total
  - property: Electricit_consumption
    icon: mdi:lightning-bolt
    sensor:
      device_class: energy
      unit: kWh
      read_only: true
      state_class: total_increasing
    combine:
      - property: Electricit_consumption_int
      - property: Electricit_consumption_decimal
        multiplier: 0.01
  - property: Water_consumption
    icon: mdi:water
    sensor:
      device_class: water
      unit: L
      read_only: true
      state_class: total_increasing
    combine:
      - property: Water_consumption_int
      - property: Water_consumption_decimal
        multiplier: 0.01
