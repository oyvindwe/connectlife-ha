# Washing Machine
statistics:
  source: energy_consumption_curve
  daily_energy_kwh: true
  daily_water_consumption: true
properties:
  - property: Door_status
    icon: mdi:door
    unavailable: 0
    sensor:
      device_class: enum
      read_only: true
      options:
        1: open
        2: other
        3: closed
  - property: machine_status
    icon: mdi:washing-machine
    sensor:
      device_class: enum
      read_only: true
      options:
        0: "off"
        1: standby
        2: running
        3: paused
        4: alarm
  - property: Detergent_display
    icon: mdi:spray
    binary_sensor:
      options:
        0: false
        1: true
  - property: Detergent_state
    icon: mdi:spray
    binary_sensor:
      device_class: problem
      options:
        0: false
        1: true
  - property: Softer_display
    icon: mdi:water
    binary_sensor:
      options:
        0: false
        1: true
  - property: Softener_state
    icon: mdi:water
    binary_sensor:
      device_class: problem
      options:
        0: false
        1: true
  - property: Selected_program_remaining_time_in_minutes
    icon: mdi:clock-end
    sensor:
      device_class: duration
      unit: min
      read_only: true
  - property: Remaining_time_of_selected_program
    icon: mdi:clock-end
    sensor:
      device_class: duration
      unit: min
      read_only: true
  - property: Selected_program_total_time_in_minutes
