    hide: true
    entity_category: diagnostic
  - property: f_e_waterfull
    binary_sensor:
      device_class: problem
      options:
        0: false
        1: true
    hide: true
    entity_category: diagnostic
  - property: f_ecm
    disable: true
  - property: f_electricity
    sensor:
      device_class: current
      unit: A
      read_only: true
      state_class: measurement
    hide: true
  - property: f_humidity
    climate:
      target: current_humidity
      unknown_value: 128
  - property: f_temp_in
    icon: mdi:thermometer
    climate:
      target: current_temperature
  - property: measured_grid_voltage
    sensor:
      device_class: voltage
      unit: V
      state_class: measurement
    hide: true
    entity_category: diagnostic
  - property: t_beep
    binary_sensor:
      options:
        0: off
        1: on
    hide: true
    entity_category: diagnostic
  - property: t_dimmer
    switch:
      device_class: switch
    icon: mdi:lightbulb-on
    entity_category: config
  - property: t_eco
    switch:
      device_class: switch
    icon: mdi:leaf
  - property: t_fan_mute
    switch:
      device_class: switch
    icon: mdi:volume-off
  - property: t_fan_speed
    climate:
      target: fan_mode
      options:
        0: auto
        2: low
        3: medium
        4: high
  - property: t_fan_speed_s
    disable: true
  - property: t_power
    climate:
      target: is_on
  - property: t_sleep
    icon: mdi:power-sleep
    switch:
      device_class: switch
  - property: t_super
    switch:
      device_class: switch
    icon: mdi:run-fast
  - property: t_temp
    climate:
      target: target_temperature
      min_value:
        celsius: 16
        fahrenheit: 61
      max_value:
        celsius: 32
        fahrenheit: 90
  - property: t_temp_type
    climate:
      target: temperature_unit
      options:
        0: celsius
        1: fahrenheit
  - property: t_tms
    switch:
      device_class: switch
  - property: t_up_down
    climate:
      target: swing_mode
      options:
        0: "off"
        1: "on"
  - property: t_work_mode
    climate:
      target: hvac_mode
      options:
        0: fan_only
        2: cool
        3: dry
        5: eco
