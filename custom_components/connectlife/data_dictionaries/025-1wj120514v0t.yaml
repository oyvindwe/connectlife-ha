# Washing Machine
properties:
- property: Current_program_phase
  sensor:
    device_class: enum
    options:
      0: not_available
      1: weigh
      2: prewash
      3: main_wash
      4: rinse
      7: spin-dry
      8: drying
      10: finished
      11: delay_start_waiting
- property: dry_time
  select:
    options:
      0: "none"
      1: "iron"
      2: "cupboard"
      3: "extra_dry"
      30: "30"
      60: "60"
      90: "90"
      120: "120"
      180: "180"
      240: "240"
- property: Selected_program_ID
  select:
    options:
      1: "cotton_dry"
      2: "synthetic_dry"
      4: "refresh"
      5: "anti_allergy"
      6: "drum_cleaning"
      7: "cotton"
      8: "synthetic"
      10: "wool"
      11: "fast15"
      12: "mix"
      14: "spin-dry"
      16: "baby"
      18: "sports"
      20: "rinse_spin"
      21: "delicates"
      22: "clean_dry_60"
      41: "power49"
      44: "bed_linen"
      45: "jeans"
      55: "hand_wash"
