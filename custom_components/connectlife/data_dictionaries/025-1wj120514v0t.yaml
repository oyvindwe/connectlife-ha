# Washing Machine
properties:
- property: Current_program_phase
  icon: mdi:state-machine
  sensor:
    read_only: true
    device_class: enum
    options:
      0: not_available
      1: weigh
      2: prewash
      3: main_wash
      4: rinse
      7: spin-dry
      8: drying
      10: finished
      11: delay_start_waiting
- property: dry_time
  icon: mdi:tumble-dryer
  select:
    options:
      0: "none"
      1: "iron"
      2: "cupboard"
      3: "extra_dry"
      30: "30"
      60: "60"
      90: "90"
      120: "120"
      180: "180"
      240: "240"
- property: Selected_program_ID
  icon: mdi:tshirt-crew
  select:
    options:
      1: "cotton_dry"
      2: "synthetic_dry"
      4: "refresh"
      5: "anti_allergy"
      6: "drum_cleaning"
      7: "cotton"
      8: "synthetic"
      10: "wool"
      11: "fast15"
      12: "mix"
      14: "spin-dry"
      16: "baby"
      18: "sports"
      20: "rinse_spin"
      21: "delicates"
      22: "clean_dry_60"
      41: "power49"
      44: "bed_linen"
      45: "jeans"
      55: "hand_wash"
- property: Spin_speed_rpm
  icon: mdi:rotate-3d-variant
  select:
    options:
      14: "1400"
      12: "1200"
      10: "1000"
      8: "800"
      6: "600"
      0: "none"
- property: temperature
  icon: mdi:thermometer-lines
  select:
    options:
      0: "cold"
      2: "20"
      3: "30"
      4: "40"
      6: "60"
      9: "90"
