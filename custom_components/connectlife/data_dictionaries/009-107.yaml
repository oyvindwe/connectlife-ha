properties:
  # This featureset's spec exposes only t_up_down (no t_swing_angle), so
  # map it to the vertical swing_mode control instead of the default switch.
  - property: t_up_down
    climate:
      target: swing_mode
      options:
        0: "off"
        1: "on"
  - property: t_work_mode
    climate:
      options:
        0: fan_only
        2: cool
        3: dry
        4: auto