# Pelgrim GVWC330L
properties:
  - property: Selected_program_id_status
    select:
      options:
        0: auto
        1: eco
        2: one_hour
        3: intensive
        4: glass
        5: hygiene
        6: night
        7: clean
      command:
        name: Selected_program_id
  - property: Selected_program_mode
    select:
      options:
        0: "0"
        1: "1"
        2: normal
        3: "3"
        4: fast
      command:
        name: Program_mode
        adjust: 1
