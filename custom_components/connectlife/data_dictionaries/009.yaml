    select:
      options:
        0: "off"
        1: general
        2: for_old
        3: for_young
        4: for_kid
    icon: mdi:power-sleep
  - property: t_super
    switch:
      device_class: switch
    icon: mdi:run-fast
  - property: t_swing_follow
    select:
      options:
        0: "off"
        1: follow
        2: not_follow
    icon: mdi:account-arrow-right
  - property: t_swing_angle
    select:
      options:
        0: swing
        1: auto
        2: angle_1
        3: angle_2
        4: angle_3
        5: angle_4
        6: angle_5
        7: angle_6
    icon: mdi:arrow-oscillating
  - property: t_swing_direction
    climate:
      target: swing_horizontal_mode
      options:
        0: forward
        1: right
        2: both_sides
        3: swing
        4: left
  - property: t_up_down
    climate:
      target: swing_mode
      options:
        0: "off"
        1: "on"
  - property: t_temp
    climate:
      target: target_temperature
      max_value:
        celsius: 32
        fahrenheit: 90
      min_value:
        celsius: 16
        fahrenheit: 61
  - property: t_temp_compensate
    # Signed 4-bit encoding: 0..7 = 0..+7 °C, 9..15 = -7..-1 °C (value 8 / -8 unused).
    # Full range applies in non-AI modes; AI mode (t_tms=1) limits effective offset to ±3 °C.
    select:
      options:
        9: "offset_minus_7"
        10: "offset_minus_6"
        11: "offset_minus_5"
        12: "offset_minus_4"
        13: "offset_minus_3"
        14: "offset_minus_2"
        15: "offset_minus_1"
        0: "offset_0"
        1: "offset_plus_1"
        2: "offset_plus_2"
        3: "offset_plus_3"
        4: "offset_plus_4"
        5: "offset_plus_5"
        6: "offset_plus_6"
        7: "offset_plus_7"
    icon: mdi:thermometer-plus
    entity_category: config
  - property: t_temp_type
    climate:
      target: temperature_unit
      options:
        0: celsius
        1: fahrenheit
  - property: t_tms
    switch:
      device_class: switch
  - property: t_work_mode
    climate:
      target: hvac_mode
      options:
        0: fan_only
        1: heat
        2: cool
        3: dry
        4: auto
