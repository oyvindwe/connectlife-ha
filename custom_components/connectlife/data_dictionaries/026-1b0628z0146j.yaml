# HISENSE American Side by Side Refrigerator RS 818 N 4 TIE 1
properties:
  - property: automatic_ice_making
    binary_sensor:
      options:
        0: false
        1: true
  - property: freeze_temperature
    number:
      device_class: temperature
      unit: °C
      min_value: -24
      max_value: -14
  - property: refrigerator_temperature
    number:
      device_class: temperature
      unit: °C
      min_value: 2
      max_value: 8
  - property: save_mode
    binary_sensor:
      options:
        0: false
        1: true
  - property: sf_mode
    binary_sensor:
      options:
        0: false
        1: true
  - property: sr_mode
    binary_sensor:
      options:
        0: false
        1: true
  - property: variation_temperature
    hide: true
    sensor:
      device_class: temperature
      unit: °C
