# Washing machine
properties:
- property: Child_lock_status_status
  icon: 'mdi:lock'
  entity_category: diagnostic
  binary_sensor: {}
- property: Current_temperature
  icon: 'mdi:thermometer'
  sensor:
    read_only: true
    device_class: temperature
    unit: °C
    state_class: measurement
- property: Delay_start_remaining_time_in_minutes
  icon: 'mdi:update'
  sensor:
    read_only: true
    device_class: duration
    unit: min
- property: Delaystart_delayend_mode_status
  icon: 'mdi:timer'
  sensor:
    read_only: true
    device_class: enum
    options:
      1: "off"
      3: "on"
- property: Delaystart_delayend_remaining_time_in_minutes
  icon: 'mdi:update'
  sensor:
    read_only: true
    device_class: duration
    unit: min
- property: Door_status
  icon: 'mdi:door'
  sensor:
    read_only: true
    device_class: enum
    options:
      0: not_available
      1: open
      2: closed
      3: locked
- property: Extra_rinse_status
  binary_sensor: {}
- property: Selected_program_anticrease_status
  binary_sensor: {}
- property: Selected_program_Disinfection
  binary_sensor: {}
- property: Selected_program_duration_in_minutes
  icon: 'mdi:timer'
  sensor:
    read_only: true
    device_class: duration
    unit: min
- property: Selected_program_entry_steam_status
  binary_sensor: {}
- property: Selected_program_id_status
  icon: 'mdi:tshirt-crew'
  sensor:
    read_only: true
    device_class: enum
    unknown_value: 255
    options:
      0: eco_40_60
      1: white_cotton
      2: color
      3: wool_manual
      4: mix_synthetic
      5: extra_hygiene
      6: fast_20
      7: intensive_59_32
      8: no_program_selected
      9: sport
      10: baby
      11: pet_hair_removal
      12: shirts
      13: drum_cleaning
      14: spinning_draining
      15: draining
      16: rinsing_softening
      17: down_feathers
- property: Selected_program_mode_status
  icon: 'mdi:tshirt-crew'
  sensor:
    read_only: true
    device_class: enum
    options:
      0: not_available
      1: normal
      3: fast
      4: extra_fast
- property: Selected_program_prewash_status
  binary_sensor: {}
- property: Selected_program_remaining_time_in_minutes
  icon: 'mdi:clock-end'
  sensor:
    read_only: true
    device_class: duration
    unit: min
- property: Selected_program_rinse_hold_status
  binary_sensor: {}
- property: Selected_program_set_temperature_status
  icon: 'mdi:thermometer'
  sensor:
    read_only: true
    device_class: enum
    options:
      0: not_available
      1: cold
      2: 20_c
      3: 30_c
      4: 40_c
      5: 60_c
- property: Selected_program_washing_spin_speed_rpm_status
  icon: 'mdi:reload'
  sensor:
    read_only: true
    device_class: enum
    options:
      0: not_available
      1: no_spin
      4: 0_rpm
      5: 800_rpm
      6: 400_rpm
      7: 1000_rpm
      8: 1200_rpm
      9: 1400_rpm
- property: Selected_program_water_pluse_status
  binary_sensor: {}
- property: Status
  icon: 'mdi:washing-machine'
  sensor:
    read_only: true
    device_class: enum
    options:
      0: "off"
      1: standby
      4: "on"
      6: running
- property: StopAddGoAllowed
