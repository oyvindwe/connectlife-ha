# Washing Machine WFSE1114-LVW002, product name WF5S1045BW
properties:
- property: Current_program_phase
  sensor:
    device_class: enum
    options:
      0: not_available
      1: weigh # not verified
      2: prewash # not verified
      3: main_wash
      4: rinsing
      5: preheat_finished # not verified
      7: spinning
      8: drying # not verified
      10: program_finished
      11: idle # not verified
      12: running # not verified
      13: anti_crease # not verified
      14: delay # not verified
- property: DefaultSpinSpeed
  sensor:
    multiplier: 100
- property: DryOpen_DefaultSpinSpeed
  # Sample value: 14
  sensor:
    read_only: true
    unit: rpm
    multiplier: 100
- property: Electricit_consumption
  sensor:
    state_class: total
  combine:
    - property: Electricit_consumption_decimal
- property: RinseNum
  sensor: # Sample value: 2
    unit: times
- property: Selected_program_ID
  sensor: # Sample value: 9
    read_only: true
    device_class: enum
    options:
      1: cotton_dry # not verified
      2: synthetic_dry # not verified
      4: refresh # not verified
      6: drum_cleaning
      7: cotton
      8: synthetic
      9: eco_40_60
      10: wool
      11: fast15
      12: mix
      13: extra_hygiene # not verified
      14: spin
      15: anti_allergy
      16: baby
      18: sports
      19: sensitive
      20: rinse_and_spin
      21: silk_and_delicates
      24: shirts
      41: power49
      42: auto
      44: bed_linen
      45: jeans
- property: Spin_speed_rpm
  sensor: # Sample value: 10
    read_only: true
    unit: rpm
    multiplier: 100
- property: temperature
  sensor:   # Sample value: 2
    read_only: true
    device_class: temperature
    unit: °C
    multiplier: 10
    state_class: measurement
