# Washing Machine WFSE1114-LVW002
properties:
- property: Current_program_phase
  sensor:
    device_class: enum
    options:
      0: not_available
      1: program_not_selected
      2: program_selected
      3: delay_start_waiting
      4: preheat
      5: preheat_finished
      6: prewash
      7: main_wash
      8: drying
      9: program_finished
      10: ventilating
      11: idle
      12: running
      13: anti_crease
      14: delay
      15: finished
- property: DefaultSpinSpeed
  sensor:
    multiplier: 100
- property: DryOpen_DefaultSpinSpeed
  # Sample value: 14
  sensor:
    read_only: true
    unit: rpm
    multiplier: 100
- property: Electricit_consumption
  sensor:
    state_class: total
  combine:
    - property: Electricit_consumption_decimal
- property: Program_end_to_shutdown_time_in_minutes
  hide: true
- property: RinseNum
  sensor: # Sample value: 2
    unit: times
- property: Selected_program_ID
  sensor: # Sample value: 9
    read_only: true
    device_class: enum
    options:
      0: cotton_storage
      1: standard
      2: iron
      3: mix
      4: synthetic
      5: wool
      6: bed_linen
      7: time
      8: baby
      9: sensitive
      10: shirts
      11: sports
      12: fast89
      13: extra_hygiene
      14: remote
      15: none
- property: Spin_speed_rpm
  sensor: # Sample value: 10
    read_only: true
    unit: rpm
    multiplier: 100
- property: temperature
  sensor:   # Sample value: 2
    read_only: true
    device_class: temperature
    unit: °C
    multiplier: 10
    state_class: measurement
