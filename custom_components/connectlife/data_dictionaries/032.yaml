    icon: mdi:selection-ellipse-arrow-inside
    sensor:
      device_class: enum
      options:
        0: cotton_storage
        1: standard
        2: iron
        3: mix
        4: synthetic
        5: wool
        6: bed_linen
        7: time
        8: baby
        9: sensitive
        10: shirts
        11: sports
        12: fast89
        13: extra_hygiene
        14: remote
        255: none
