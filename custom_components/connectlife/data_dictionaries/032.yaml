# Tumble dryer
properties:
  - property: Actions
    select:
      options:
        0: stop
        1: start
        2: pause
        3: cancel
        4: reset_programs_to_default
        5: program_continue
        6: production_test
  - property: AdaptTech_setting
    # Example value: 2
  - property: Airing_program_Set_time
    optional: true
    number:
      device_class: duration
      unit: min
      command:
        name: Airing_program_Set_time_set
  - property: Alarm_1
    optional: true
    icon: mdi:tumble-dryer-alert
    binary_sensor:
      device_class: problem
  - property: Alarm_2
    optional: true
    icon: mdi:tumble-dryer-alert
    binary_sensor:
      device_class: problem
