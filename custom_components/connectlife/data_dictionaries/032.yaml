  - property: Alarm_11
    optional: true
    icon: mdi:tumble-dryer-alert
    binary_sensor:
      device_class: problem
  - property: Alarm_12
    optional: true
    icon: mdi:tumble-dryer-alert
    binary_sensor:
      device_class: problem
  - property: AntiCrease_setting
    # anti crease 1,2,3 hours
    unavailable: 0
    select:
      options:
        1: "off"
        2: 1_hour
        3: 2_hours
        4: 3_hours
        5: 4_hours
      command:
        name: Selected_program_AntiCrease
        adjust: 1
  - property: Appliance_status
    icon: mdi:tumble-dryer
    sensor:
      device_class: enum
      options:
        5: "off"
        6: idle
        7: running
  - property: Brightness_setting
    optional: true
    entity_category: config
    number:
      command:
        name: Brightness_setting_set
  - property: Bundling_Humidity
    sensor:
      device_class: humidity
      unit: "%"
      unknown_value: 255
      state_class: measurement
  - property: Bundling_Temperature
    sensor:
      device_class: temperature
      unit: celsius
      unknown_value: 255
      state_class: measurement
  - property: Bundling_sensor_setting_status
    # Example value: 0
  - property: Buzzer_setting
    optional: true
    unavailable: 0
    entity_category: config
    switch:
      "off": 1
      "on": 2
      command:
        name: Buzzer_setting_set
        adjust: 1
  - property: Child_Lock_status
    unavailable: 0
    entity_category: config
    switch:
      "off": 1
      "on": 2
      command:
        name: Child_Lock
        adjust: 1
  - property: Cleaning_reminder_setting
    optional: true
    unavailable: 0
    entity_category: config
    switch:
      "off": 1
      "on": 2
      command:
        name: Cleaning_reminder_setting_set
        adjust: 1
  - property: Condensed_watermode
    optional: true
  - property: Current_programphase
    # 1 device off, 3 and 4 program is running no info in app what that means
    icon: mdi:state-machine
    sensor:
      device_class: enum
      options:
        1: "off"
        3: running
        4: running
  - property: DelayStart_DelayEnd_duration_inminutes
    sensor:
      device_class: duration
      unit: min
  - property: DelayStart_DelayEnd_mode
    binary_sensor:
    optional: true
  - property: DelayStart_DelayEnd_remaining_timein_minutes
    sensor:
      device_class: duration
      unit: min
  - property: Delay_duration_inminutes
    sensor:
      device_class: duration
      unit: min
  - property: Demo_mode
    optional: true
    unavailable: 0
    entity_category: config
    switch:
      "off": 1
      "on": 2
      command:
        name: Demo_mode_set
        adjust: 1
  - property: Door_status
    unavailable: 0
    hide: true
    icon: mdi:door
    binary_sensor:
      device_class: door
      options:
        1: off
        2: on
  - property: Drum_illumination
