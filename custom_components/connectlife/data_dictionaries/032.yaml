    optional: true
  - property: Sound_settings
    optional: true
    # Example value: 3
    unavailable: 0
    entity_category: config
    select:
      options:
        1: '0'
        2: '1'
        3: '2'
        4: '3'
        5: '4'
        6: '5'
      command:
        name: Sound_setting
        adjust: 1
