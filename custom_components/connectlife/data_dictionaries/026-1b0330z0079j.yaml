properties:
  - property: free_room_open
    binary_sensor:
      device_class: door
  - property: freeze_temperature
    number:
      device_class: temperature
      unit: °C
      min_value: -24
      max_value: -14
  - property: refr_room_open
    binary_sensor:
      device_class: door
  - property: refrigerator_temperature
    number:
      device_class: temperature
      unit: °C
      min_value: 2
      max_value: 8
  - property: vari_room_open
    binary_sensor:
      device_class: door
