# ASKO dishwasher (DFI777UXXL family).
properties:
  - property: Selected_program_id_status
    select:
      options:
        0: eco
        1: auto
        2: universal
        3: intensive
        4: quick_pro
        5: preheated
        6: crystal_glass
        7: time_program
      command:
        name: Selected_program_id
  - property: Selected_program_mode
    select:
      options:
        0: "not_available"
        2: "normal"
        4: "speed"
        5: "night"
      command:
        name: Program_mode
        adjust: 1
  - property: Time_program_set_duration_status
    select:
      options:
        0: "not_available"
        1: "not_set"
        2: "15_min"
        3: "30_min"
        4: "45_min"
        5: "1_h"
        6: "1_h_30_min"
        7: "2_h"
        8: "2_h_30_min"
      command:
        name: Time_program_set_duration
        adjust: 1
