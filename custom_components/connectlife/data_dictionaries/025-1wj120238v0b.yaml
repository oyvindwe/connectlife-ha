# Washing Machine
properties:
  - property: Selected_program_ID
    icon: mdi:tshirt-crew
    select:
      options:
        6: drum_clean
        7: cotton
        9: eco_40_60
        10: wool
        11: quick_15
        12: mix
        14: spin
        15: allergy_care
        16: baby_care
        18: sportswear
        19: down
        20: rinse_spin
        21: silk_delicate
        24: shirts
        41: power_49
        42: auto
        44: bedding
        45: jeans
  - property: Spin_speed_rpm
    icon: mdi:rotate-3d-variant
    select:
      options:
        0: none
        6: "600"
        8: "800"
        10: "1000"
        12: "1200"
        14: "1400"
  - property: temperature
    icon: mdi:thermometer-lines
    select:
      options:
        0: cold
        2: "20"
        3: "30"
        4: "40"
        6: "60"
        9: "90"
  - property: Current_program_phase
    icon: mdi:state-machine
    sensor:
      read_only: true
      device_class: enum
      options:
        0: not_available
        1: weigh
        2: prewash
        3: wash
        4: rinse
        7: spin-dry
        10: finished
